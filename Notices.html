<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School System</title>

<!-- ✅ External CSS -->
<link rel="stylesheet" href="style.css">
<style>
/* =========================
   RESET
========================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: "Segoe UI", sans-serif;
}

/* =========================
   BODY
========================= */
body{
  background: #f4f6fb;
}

/* =========================
   HEADER
========================= */
.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:#2c3e50;
  color:white;
  padding:10px 15px;
}

.logo{
  width:40px;
}

.title{
  font-size:18px;
  font-weight:bold;
}

.menu-btn{
  font-size:22px;
  cursor:pointer;
}

/* =========================
   SIDEBAR
========================= */
.sidebar{
  position:fixed;
  top:60px;
  left:-200px;
  width:200px;
  height:100%;
  background:#34495e;
  color:white;
  transition:0.3s;
  z-index:1000;
}

.sidebar.active{
  left:0;
}

.sidebar div{
  padding:12px;
  cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.sidebar div:hover{
  background:#1abc9c;
}

/* =========================
   TOP NAV
========================= */
.topnav{
  display:flex;
  gap:10px;
  padding:10px;
  background:white;
  position:sticky;
  top:60px;
  z-index:999;
}

.topnav button{
  padding:6px 12px;
  border:none;
  background:#ecf0f1;
  cursor:pointer;
  border-radius:6px;
}

.topnav button:hover{
  background:#3498db;
  color:white;
}

/* =========================
   CONTAINER
========================= */
.container{
  padding:15px;
}

.container button{
  margin-right:10px;
  padding:8px 14px;
  border:none;
  background:#3498db;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

.container button:hover{
  background:#2980b9;
}

/* =========================
   POSTS
========================= */
.post{
  background:white;
  margin-top:15px;
  padding:12px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  cursor:pointer;
  transition:0.2s;
}

.post:hover{
  transform:scale(1.02);
}

.post h4{
  margin-bottom:5px;
}

.post small{
  color:gray;
}

/* MEDIA GRID */
.media{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:10px;
}

.media img,
.media video{
  width:120px;
  height:90px;
  object-fit:cover;
  border-radius:6px;
  cursor:pointer;
}

/* =========================
   MODAL
========================= */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:2000;
}

.modal-box{
  background:white;
  padding:20px;
  border-radius:10px;
  width:300px;
  max-width:90%;
}

.modal-box input,
.modal-box select{
  width:100%;
  padding:8px;
  border:1px solid #ccc;
  border-radius:5px;
}

.modal-box button{
  margin-right:5px;
  padding:8px 10px;
  border:none;
  background:#2ecc71;
  color:white;
  border-radius:5px;
  cursor:pointer;
}

.modal-box button:last-child{
  background:#e74c3c;
}

/* =========================
   PREVIEW
========================= */
.preview{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.preview img,
.preview video{
  width:60px;
  height:60px;
  object-fit:cover;
  border-radius:5px;
}

/* =========================
   VIEWER (FULLSCREEN)
========================= */
#viewer{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:3000;
}

#viewerContent img,
#viewerContent video{
  max-width:90%;
  max-height:80%;
}

.close-btn{
  position:absolute;
  top:20px;
  right:20px;
  color:white;
  font-size:25px;
  cursor:pointer;
}

/* =========================
   RESPONSIVE
========================= */
@media(max-width:600px){

  .media img,
  .media video{
    width:100px;
    height:80px;
  }

  .title{
    font-size:16px;
  }

}
</style>
<!-- QR / external libs (if needed later safe to keep) -->
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png" class="logo">
  <div class="title">Shree Limpatar Mavi</div>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div onclick="setCategory('All')">All</div>
  <div onclick="setCategory('Holiday')">Holiday</div>
  <div onclick="setCategory('Sports')">Sports</div>
  <div onclick="setCategory('Administrative')">Administrative</div>
  <div onclick="setCategory('Announcement')">Announcement</div>
  <div onclick="setCategory('News')">News</div>
</div>

<!-- TOP FILTER -->
<div class="topnav">
  <button onclick="setType('All')">All</button>
  <button onclick="setType('image')">Photo</button>
  <button onclick="setType('video')">Video</button>
  <button onclick="setType('text')">Text</button>
</div>

<!-- MAIN CONTAINER -->
<div class="container">
  <button onclick="openModal('upload')">Upload</button>
  <button onclick="openModal('edit')">Edit</button>
  <button onclick="openModal('delete')">Delete</button>

  <div id="feed"></div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h3 id="modalTitle"></h3>

    <input id="postTitle" placeholder="Title"><br><br>

    <select id="category">
      <option>Holiday</option>
      <option>Sports</option>
      <option>Administrative</option>
      <option>Announcement</option>
      <option>News</option>
    </select><br><br>

    <input type="file" id="fileInput" multiple accept="image/*,video/*" onchange="previewFiles()"><br><br>

    <div id="preview" class="preview"></div><br>

    <input type="password" id="password" placeholder="Password"><br><br>

    <button onclick="submitAction()">Submit</button>
    <button onclick="closeModal()">Cancel</button>
  </div>
</div>

<!-- FULLSCREEN VIEW -->
<div id="viewer">
  <div class="close-btn" onclick="closeViewer()">✖</div>
  <div id="viewerContent"></div>
</div>

<!-- 🔊 SOUND (for advanced JS) -->
<audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

<!-- ✅ External JS -->
<script>

/* =========================
   DATA
========================= */
let posts = JSON.parse(localStorage.getItem("posts")) || [];
let currentCategory = "All";
let currentType = "All";
let currentMode = "";
let selectedIndex = null;

const ADMIN_PASS = "Manish.13"; // 🔑 change this

/* =========================
   MENU
========================= */
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
}

/* =========================
   FILTER
========================= */
function setCategory(cat){
  currentCategory = cat;
  renderFeed();
}

function setType(type){
  currentType = type;
  renderFeed();
}

/* =========================
   MODAL
========================= */
function openModal(mode){
  currentMode = mode;
  document.getElementById("modal").style.display = "flex";
  document.getElementById("modalTitle").innerText = mode.toUpperCase();
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
  clearForm();
}

/* =========================
   FILE PREVIEW
========================= */
function previewFiles(){
  const preview = document.getElementById("preview");
  preview.innerHTML = "";

  const files = document.getElementById("fileInput").files;

  Array.from(files).forEach(file=>{
    const reader = new FileReader();
    reader.onload = function(e){
      if(file.type.startsWith("image")){
        preview.innerHTML += `<img src="${e.target.result}" width="80">`;
      }else{
        preview.innerHTML += `<video src="${e.target.result}" width="80"></video>`;
      }
    };
    reader.readAsDataURL(file);
  });
}

/* =========================
   SUBMIT ACTION
========================= */
function submitAction(){
  const pass = document.getElementById("password").value;

  if(pass !== ADMIN_PASS){
    alert("Wrong password!");
    return;
  }

  if(currentMode === "upload") uploadPost();
  if(currentMode === "edit") editPost();
  if(currentMode === "delete") deletePost();

  closeModal();
  renderFeed();
}

/* =========================
   UPLOAD
========================= */
function uploadPost(){
  const title = document.getElementById("postTitle").value.trim();
  const category = document.getElementById("category").value;
  const files = document.getElementById("fileInput").files;

  if(!title){
    alert("Title is required!");
    return;
  }

  let media = [];

  // ✅ If no files → save directly
  if(files.length === 0){
    savePost(title, category, media);
    return;
  }

  let promises = [];

  Array.from(files).forEach(file=>{
    promises.push(new Promise((resolve)=>{
      const reader = new FileReader();

      reader.onload = function(e){
        resolve({
          type: file.type.startsWith("image") ? "image" : "video",
          src: e.target.result
        });
      };

      reader.readAsDataURL(file);
    }));
  });

  // ✅ Wait for ALL files to finish
  Promise.all(promises).then(results=>{
    media = results;
    savePost(title, category, media);
    renderFeed(); // 🔥 ensure UI updates
  });
}

function savePost(title, category, media){
  posts.unshift({
    title,
    category,
    media
  });

  localStorage.setItem("posts", JSON.stringify(posts));

  console.log("Saved:", posts); // debug
}
/* =========================
   EDIT
========================= */
function editPost(){
  const title = document.getElementById("postTitle").value;

  if(selectedIndex === null){
    alert("Click a post first!");
    return;
  }

  posts[selectedIndex].title = title;

  localStorage.setItem("posts", JSON.stringify(posts));
}

/* =========================
   DELETE
========================= */
function deletePost(){
  if(selectedIndex === null){
    alert("Click a post first!");
    return;
  }

  posts.splice(selectedIndex, 1);
  selectedIndex = null;

  localStorage.setItem("posts", JSON.stringify(posts));
}

/* =========================
   RENDER FEED
========================= */
function renderFeed(){
  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  posts.forEach((post, index)=>{

    if(currentCategory !== "All" && post.category !== currentCategory) return;

    let filteredMedia = post.media;

    if(currentType !== "All"){
      filteredMedia = post.media.filter(m => m.type === currentType);
      if(filteredMedia.length === 0) return;
    }

    let html = `
      <div class="post" onclick="selectPost(${index})">
        <h4>${post.title}</h4>
        <small>${post.category}</small>
        <div class="media">
    `;

    filteredMedia.forEach(m=>{
  if(m.type === "image"){
    html += `<img src="${m.src}" onclick="openViewer(this.src,'image')">`;
  }else{
    html += `<video src="${m.src}" onclick="openViewer(this.src,'video')"></video>`;
  }
});
    html += `</div></div>`;

    feed.innerHTML += html;
  });
}

/* =========================
   SELECT POST
========================= */
function selectPost(index){
  selectedIndex = index;
  playSound();
}

/* =========================
   VIEWER
========================= */
function openViewer(src, type){
  const viewer = document.getElementById("viewer");
  const content = document.getElementById("viewerContent");

  viewer.style.display = "flex";

  if(type === "image"){
    content.innerHTML = `<img src="${src}" style="max-width:90%">`;
  }else{
    content.innerHTML = `<video src="${src}" controls autoplay style="max-width:90%"></video>`;
  }
}

function closeViewer(){
  document.getElementById("viewer").style.display = "none";
}

/* =========================
   SOUND
========================= */
function playSound(){
  document.getElementById("clickSound").play();
}

/* =========================
   CLEAR FORM
========================= */
function clearForm(){
  document.getElementById("postTitle").value = "";
  document.getElementById("fileInput").value = "";
  document.getElementById("preview").innerHTML = "";
  document.getElementById("password").value = "";
}

/* =========================
   INIT
========================= */
renderFeed();

 
</script>

</body>
</html>
